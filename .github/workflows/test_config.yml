name: Test Config Error - PR Feature

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run config test (will fail - missing env vars)
        run: python test_config_error.py
